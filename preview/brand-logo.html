<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;padding:24px;display:flex;flex-direction:column;gap:20px}
.label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5868;margin-bottom:10px}
.bg-dark{background:#0a0a0f;padding:20px;border:1px solid #2a2a3a;border-radius:6px}
.bg-surface{background:#13131a;padding:20px;border:1px solid #2a2a3a;border-radius:6px}
</style></head><body>
<div>
  <div class="label">On dark background</div>
  <div class="bg-dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="260" height="46">
      <circle cx="8"  cy="20" r="4.5" fill="#d4886a" opacity="0.9"/>
      <circle cx="20" cy="12" r="3.5" fill="#d4a76a" opacity="0.85"/>
      <circle cx="26" cy="28" r="3"   fill="#7aa3c8" opacity="0.85"/>
      <circle cx="14" cy="34" r="2.5" fill="#6a98b8" opacity="0.8"/>
      <circle cx="32" cy="16" r="2"   fill="#a8c87a" opacity="0.8"/>
      <circle cx="36" cy="32" r="3"   fill="#7ac896" opacity="0.8"/>
      <circle cx="6"  cy="38" r="1.8" fill="#c8a882" opacity="0.6"/>
      <circle cx="22" cy="42" r="1.5" fill="#d4886a" opacity="0.5"/>
      <circle cx="38" cy="42" r="1.5" fill="#7aa3c8" opacity="0.5"/>
      <text x="52" y="26" font-family="'Playfair Display',Georgia,serif" font-size="22" font-weight="400" fill="#e8e6e3">Aesthetic</text>
      <text x="52" y="49" font-family="'Playfair Display',Georgia,serif" font-size="22" font-style="italic" fill="#c8a882">Cartography</text>
    </svg>
  </div>
</div>
<div>
  <div class="label">On surface background</div>
  <div class="bg-surface">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="260" height="46">
      <circle cx="8"  cy="20" r="4.5" fill="#d4886a" opacity="0.9"/>
      <circle cx="20" cy="12" r="3.5" fill="#d4a76a" opacity="0.85"/>
      <circle cx="26" cy="28" r="3"   fill="#7aa3c8" opacity="0.85"/>
      <circle cx="14" cy="34" r="2.5" fill="#6a98b8" opacity="0.8"/>
      <circle cx="32" cy="16" r="2"   fill="#a8c87a" opacity="0.8"/>
      <circle cx="36" cy="32" r="3"   fill="#7ac896" opacity="0.8"/>
      <circle cx="6"  cy="38" r="1.8" fill="#c8a882" opacity="0.6"/>
      <circle cx="22" cy="42" r="1.5" fill="#d4886a" opacity="0.5"/>
      <circle cx="38" cy="42" r="1.5" fill="#7aa3c8" opacity="0.5"/>
      <text x="52" y="26" font-family="'Playfair Display',Georgia,serif" font-size="22" font-weight="400" fill="#e8e6e3">Aesthetic</text>
      <text x="52" y="49" font-family="'Playfair Display',Georgia,serif" font-size="22" font-style="italic" fill="#c8a882">Cartography</text>
    </svg>
  </div>
</div>
</body></html>
