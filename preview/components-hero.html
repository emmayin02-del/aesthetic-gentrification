<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;padding:0;overflow:hidden}
.hero{min-height:340px;display:flex;flex-direction:column;justify-content:center;padding:0 8%;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-20%;right:-10%;width:60%;height:300px;background:radial-gradient(ellipse,rgba(200,168,130,0.06) 0%,transparent 70%);pointer-events:none}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#c8a882;margin-bottom:20px}
h1{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:400;line-height:1.08;color:#e8e6e3}
h1 em{font-style:italic;color:#c8a882}
.sub{font-family:'DM Sans',sans-serif;font-size:1rem;color:#8a8898;max-width:52ch;margin-top:20px;line-height:1.65}
.stats{display:flex;gap:48px;margin-top:40px}
.val{font-family:'Playfair Display',serif;font-size:2.2rem;color:#c8a882}
.lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:#5a5868;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
</style></head><body>
<section class="hero">
  <div class="eyebrow">Media Studies × Computational Analysis</div>
  <h1>Aesthetic <em>Cartography</em></h1>
  <p class="sub">Mapping the visual language of gentrification across Amsterdam, London, and Tokyo — through 1,164 Airbnb and Instagram images.</p>
  <div class="stats">
    <div><div class="val">1,164</div><div class="lbl">Images analysed</div></div>
    <div><div class="val">6</div><div class="lbl">Neighborhoods</div></div>
    <div><div class="val">47</div><div class="lbl">Visual markers</div></div>
    <div><div class="val">3</div><div class="lbl">Cities</div></div>
  </div>
</section>
</body></html>
