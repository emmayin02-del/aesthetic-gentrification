<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;padding:24px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.tooltip{background:rgba(19,19,26,0.95);border:1px solid #2a2a3a;border-radius:6px;padding:12px 16px;font-size:12px;width:220px}
.tt-hood{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tt-platform{color:#5a5868;font-size:10px;font-family:'DM Sans',sans-serif;margin-bottom:4px}
.tt-markers{color:#8a8898;font-size:11px;line-height:1.5;font-family:'DM Sans',sans-serif}
.network-tt{background:rgba(19,19,26,0.95);border:1px solid #2a2a3a;border-radius:6px;padding:12px 16px;font-size:12px;width:220px;font-family:'DM Sans',sans-serif}
.nt-name{color:#c8a882;font-weight:500;margin-bottom:4px}
.nt-body{color:#8a8898;margin-bottom:4px}
.nt-meta{color:#5a5868;font-size:10px;font-family:'JetBrains Mono',monospace}
</style></head><body>
<div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5868;margin-bottom:10px">Galaxy tooltip</div>
  <div class="tooltip">
    <div class="tt-hood" style="color:#d4886a">De Pijp</div>
    <div class="tt-platform">instagram</div>
    <div class="tt-markers">coffee/cafe · exposed brick · indoor plants · natural light · marble/stone</div>
  </div>
</div>
<div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5868;margin-bottom:10px">Network tooltip</div>
  <div class="network-tt">
    <div class="nt-name">minimalist furniture</div>
    <div class="nt-body">Appears in 312 images</div>
    <div class="nt-meta">IG: 187 · Airbnb: 125</div>
  </div>
</div>
</body></html>
