<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;padding:24px}
.specimens{display:flex;flex-direction:column;gap:20px}
.specimen{border-bottom:1px solid #2a2a3a;padding-bottom:20px}
.specimen:last-child{border-bottom:none;padding-bottom:0}
.meta{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5868;margin-bottom:8px}
</style></head><body>
<div class="specimens">
  <div class="specimen">
    <div class="meta">Playfair Display / 400 / clamp(2.8rem,6vw,5.5rem) / lh 1.08</div>
    <div style="font-family:'Playfair Display',serif;font-size:3.8rem;font-weight:400;line-height:1.08;color:#e8e6e3">Aesthetic <em style="color:#c8a882;font-style:italic">Cartography</em></div>
  </div>
  <div class="specimen">
    <div class="meta">Playfair Display / 400 Italic / display accent</div>
    <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;font-style:italic;color:#c8a882">Mapping Visual Language</div>
  </div>
  <div class="specimen">
    <div class="meta">Playfair Display / 400 / 2rem / section h2</div>
    <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:#e8e6e3">Visual Galaxy</div>
  </div>
  <div class="specimen">
    <div class="meta">Playfair Display / 400 / 2.2rem / stat numeral</div>
    <div style="font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:400;color:#c8a882">1,164</div>
  </div>
</div>
</body></html>
